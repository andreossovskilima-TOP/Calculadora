<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Letron Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator">
        <div class="calc-top">
            <div class="screen-container">
                <input type="text" id="display" readonly value="0">
            </div>
            <div class="brand">letron</div>
        </div>

        <div class="buttons-grid">
            <button class="btn btn-blue" onclick="clearMemory()">MRC</button>
            <button class="btn btn-blue" onclick="memorySubtract()">M-</button>
            <button class="btn btn-blue" onclick="memoryAdd()">M+</button>
            <button class="btn btn-blue" onclick="appendOperator('%')">%</button>
            <button class="btn btn-red" onclick="clearAll()">ON/C</button>

            <button class="btn btn-black" onclick="appendNumber('7')">7</button>
            <button class="btn btn-black" onclick="appendNumber('8')">8</button>
            <button class="btn btn-black" onclick="appendNumber('9')">9</button>
            <button class="btn btn-blue" onclick="backspace()">➔</button>
            <button class="btn btn-blue" onclick="appendOperator('GT')">GT</button>

            <button class="btn btn-black" onclick="appendNumber('4')">4</button>
            <button class="btn btn-black" onclick="appendNumber('5')">5</button>
            <button class="btn btn-black" onclick="appendNumber('6')">6</button>
            <button class="btn btn-blue" onclick="appendOperator('-')">-</button>
            <button class="btn btn-blue" onclick="appendOperator('+')">+</button>

            <button class="btn btn-black" onclick="appendNumber('1')">1</button>
            <button class="btn btn-black" onclick="appendNumber('2')">2</button>
            <button class="btn btn-black" onclick="appendNumber('3')">3</button>
            <button class="btn btn-blue double-height" onclick="appendOperator('+')">+</button>
            <button class="btn btn-blue" onclick="appendOperator('*')">×</button>

            <button class="btn btn-black" onclick="appendNumber('0')">0</button>
            <button class="btn btn-black" onclick="appendNumber('00')">00</button>
            <button class="btn btn-black" onclick="appendNumber('.')">.</button>
            <button class="btn btn-blue" onclick="calculate()">=</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
